services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_planner}
      POSTGRES_USER: ${POSTGRES_USER:-ai_planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_planner_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-planner

  redis:
    image: redis:7-alpine
    container_name: ai-planner-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-planner

  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    image: ai-planner-agent-service:local
    container_name: ai-planner-agent-service
    restart: unless-stopped
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE_URL: ${DEEPSEEK_API_BASE_URL:-https://api.deepseek.com}
      PROFILE_ANALYZER_MODEL: ${PROFILE_ANALYZER_MODEL:-deepseek-v4-pro}
      PROFILE_ANALYZER_TIMEOUT_SECONDS: ${PROFILE_ANALYZER_TIMEOUT_SECONDS:-30}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${AGENT_SERVICE_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - ai-planner

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ai-planner-backend:local
    container_name: ai-planner-backend
    restart: unless-stopped
    environment:
      BACKEND_PORT: 8080
      POSTGRES_DB: ${POSTGRES_DB:-ai_planner}
      POSTGRES_USER: ${POSTGRES_USER:-ai_planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_planner_dev_password}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ai_planner}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ai_planner}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ai_planner_dev_password}
      AGENT_SERVICE_BASE_URL: http://agent-service:8000
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-86400}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      agent-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - ai-planner

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ai-planner-frontend:local
    container_name: ai-planner-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      NEXT_PUBLIC_BACKEND_API_BASE_URL: http://backend:8080
      BACKEND_BASE_URL: http://backend:8080
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ai-planner

volumes:
  postgres-data:
  redis-data:

networks:
  ai-planner:
    driver: bridge
