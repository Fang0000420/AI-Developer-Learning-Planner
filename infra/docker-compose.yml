services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_planner}
      POSTGRES_USER: ${POSTGRES_USER:-ai_planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_planner_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-planner

  redis:
    image: redis:7-alpine
    container_name: ai-planner-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-planner

  # TODO: Add frontend service after the Next.js app is initialized.
  # TODO: Add backend service after the Spring Boot app is initialized.
  # TODO: Add agent-service after the FastAPI app is initialized.

volumes:
  postgres-data:
  redis-data:

networks:
  ai-planner:
    driver: bridge
