spring:
  application:
    name: ai-developer-learning-planner-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ai_planner}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:ai_planner}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:ai_planner_dev_password}}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}/0}
      timeout: ${REDIS_TIMEOUT:2s}

server:
  port: ${BACKEND_PORT:8080}

agent-service:
  base-url: ${AGENT_SERVICE_BASE_URL:http://localhost:8000}

app:
  redis:
    async-job-cache-ttl: ${REDIS_ASYNC_JOB_CACHE_TTL:PT24H}
    async-job-active-ttl: ${REDIS_ASYNC_JOB_ACTIVE_TTL:PT30M}
    resource-lock-ttl: ${REDIS_RESOURCE_LOCK_TTL:PT30M}
  storage:
    knowledge-root: ${KNOWLEDGE_STORAGE_ROOT:${user.dir}/storage/knowledge}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] requestId=%X{requestId:-none} %logger{36} - %msg%n"
